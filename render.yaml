# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: innocurve-judge
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      # 선택: JUDGE_MODEL / JUDGE_FALLBACK_MODEL / JUDGE_ENSEMBLE_N / JUDGE_RANGE_THRESHOLD
