# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: innocurve-judge
    runtime: python
    plan: free
    buildCommand: pip install --default-timeout=100 --prefer-binary -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
